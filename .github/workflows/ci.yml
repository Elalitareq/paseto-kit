name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Cross-runtime smoke: import the built ESM bundle under Deno and Bun.
  cross-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno eval "import { generateLocalKey, encrypt, decrypt } from './dist/index.js'; const k = generateLocalKey(); const t = encrypt(k, { ok: true }); if (decrypt(k, t).payload.ok !== true) throw new Error('deno smoke failed'); console.log('deno ok');"
      - uses: oven-sh/setup-bun@v2
      - run: bun -e "import { generateLocalKey, encrypt, decrypt } from './dist/index.js'; const k = generateLocalKey(); const t = encrypt(k, { ok: true }); if (decrypt(k, t).payload.ok !== true) throw new Error('bun smoke failed'); console.log('bun ok');"
